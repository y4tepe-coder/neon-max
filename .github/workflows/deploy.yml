name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /docker/neon-website
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/y4tepe-coder/neon-max.git
              git fetch origin main
              git reset --hard origin/main
            else
              git pull origin main
            fi
            docker compose down --remove-orphans
            docker rm -f neon-website-neon-agentur-1 2>/dev/null || true
            docker network rm neon-website_default 2>/dev/null || true
            docker compose up -d --build
